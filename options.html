<!DOCTYPE html>
<html>
<head>
    <title>Turnstile Solver Options</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-top: 0;
        }
        .form-group {
            margin: 20px 0;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #2196F3;
            box-shadow: 0 0 5px rgba(33, 150, 243, 0.3);
        }
        button {
            background: #2196F3;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            margin-right: 10px;
        }
        button:hover {
            background: #1976D2;
        }
        button.secondary {
            background: #666;
        }
        button.secondary:hover {
            background: #555;
        }
        .status {
            padding: 12px;
            border-radius: 4px;
            margin-top: 20px;
            display: none;
        }
        .status.success {
            background: #4CAF50;
            color: white;
            display: block;
        }
        .status.error {
            background: #f44336;
            color: white;
            display: block;
        }
        .info {
            background: #E3F2FD;
            border-left: 4px solid #2196F3;
            padding: 12px;
            margin: 20px 0;
            border-radius: 4px;
            color: #1565C0;
        }
        a {
            color: #2196F3;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Turnstile Solver v10</h1>
        
        <div class="info">
            <strong>Using Anti-Captcha API</strong><br>
            Get your free API key from <a href="https://anti-captcha.com" target="_blank">anti-captcha.com</a>
        </div>
        
        <div class="form-group">
            <label for="apiKey">Anti-Captcha API Key:</label>
            <input type="password" id="apiKey" placeholder="Paste your API key here...">
        </div>
        
        <div>
            <button onclick="saveSettings()">💾 Save</button>
            <button class="secondary" onclick="testSettings()">🧪 Test Connection</button>
        </div>
        
        <div id="status" class="status"></div>
        
        <div class="info" style="margin-top: 30px;">
            <strong>ℹ️ How to get your API key:</strong>
            <ol>
                <li>Visit <a href="https://anti-captcha.com" target="_blank">anti-captcha.com</a></li>
                <li>Sign up (free account with ~$10 credit)</li>
                <li>Go to Settings → API</li>
                <li>Copy your API Key</li>
                <li>Paste it above and click Save</li>
            </ol>
        </div>
    </div>
    
    <script src="options.js"></script>
</body>
</html>
